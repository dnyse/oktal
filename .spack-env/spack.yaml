# This is a Spack Environment file.
#
# It describes a set of packages to be installed, along with
# configuration settings.
spack:
  # add package specs to the `specs` list
  specs:
  - highfive
  - hdf5
  view: ./view
  concretizer:
    unify: true
  packages:
    gcc:
      externals:
      - spec: gcc@15.2.1 languages:='c,c++,fortran'
        prefix: /usr
        extra_attributes:
          compilers:
            c: /usr/bin/gcc
            cxx: /usr/bin/g++
            fortran: /usr/bin/gfortran
    llvm:
      externals:
      - spec: llvm@21.1.5+clang~flang+lld~lldb
        prefix: /usr
        extra_attributes:
          compilers:
            c: /usr/bin/clang
            cxx: /usr/bin/clang++
